version: '3.8'

services:

  catalogue:
    build: ./Catalogue
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build: ./user
    image: user:1.0.0
    container_name: user
    depends_on:
      - redis

  frontend:
    build: ./frontend
    image: frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user

  mongodb:
    build: ./MongoDB
    image: mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop